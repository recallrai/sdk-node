name: Publish to npm (manual)

# Automatic publishing happens in create-release.yml on tag push.
# This workflow is a manual fallback for re-publishing without a new tag.
on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "18.x"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build package
        run: pnpm run build

      # - name: Test
      #   run: pnpm test

      - name: Publish package
        run: |
          if [ -n "${{ secrets.NPM_ORG }}" ]; then
            pnpm publish --access public --scope=${{ secrets.NPM_ORG }} --no-git-checks
          else
            pnpm publish --no-git-checks
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
